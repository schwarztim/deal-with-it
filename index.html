<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal With It 😎</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bangers&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--fg:#e0e0e0;--fg2:#aaa;--fg3:#888;--fg4:#555;
  --accent:#e94560;--accent-h:#c73e55;--border:#444;--border2:#333;
  --preview-bg:#111;--spinner-bg:#333;--disabled:#555;--btn2:#0f3460;--btn2-h:#1a4a80;
}
@media(prefers-color-scheme:light){:root{
  --bg:#f5f5f7;--bg2:#ffffff;--bg3:#f0f0f5;--fg:#1a1a2e;--fg2:#555;--fg3:#777;--fg4:#aaa;
  --accent:#d63050;--accent-h:#b82845;--border:#ccc;--border2:#ddd;
  --preview-bg:#eee;--spinner-bg:#ccc;--disabled:#bbb;--btn2:#e8e8f0;--btn2-h:#d8d8e5;
}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;transition:background .2s,color .2s}
h1{font-size:2.2rem;margin:16px 0;text-align:center}
h1 span{font-size:2.5rem}
.container{max-width:800px;width:100%;display:flex;flex-direction:column;gap:14px}
.section-title{font-size:.85rem;color:var(--accent);font-weight:bold;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.section-title .toggle{font-size:.75rem;color:var(--fg3);cursor:pointer;text-decoration:underline;text-transform:none;letter-spacing:0}
.drop-zone{border:3px dashed var(--border);border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:var(--bg3)}
.drop-zone p{font-size:1rem;color:var(--fg3)}
.drop-zone .icon{font-size:2.5rem;margin-bottom:8px}
.drop-zone input{display:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.og{background:var(--bg2);border-radius:10px;padding:12px}
.og label{display:block;font-size:.75rem;color:var(--fg2);margin-bottom:4px}
.og input[type="range"]{width:100%;accent-color:var(--accent)}
.og .val{text-align:center;font-weight:bold;color:var(--accent);margin-top:2px;font-size:.8rem}
.og select,.og input[type="text"]{width:100%;padding:7px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--fg);font-size:.85rem}
.og input[type="color"]{width:40px;height:28px;border:none;border-radius:6px;cursor:pointer;background:transparent;vertical-align:middle}
.cr{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cr span{font-size:.75rem;color:var(--fg2)}
.full{grid-column:1/-1}
.cg{grid-column:1/-1;text-align:center}
.cg label{cursor:pointer;color:var(--accent);text-decoration:underline;font-size:.8rem}
.cg input{display:none}
/* Preview */
.preview-wrap{position:relative;background:var(--preview-bg);border-radius:12px;overflow:hidden;text-align:center}
.preview-wrap canvas{max-width:100%;height:auto;display:block;margin:0 auto}
.preview-placeholder{padding:40px;color:var(--fg4);font-size:.9rem}
/* Buttons */
.btn{display:inline-block;padding:12px 32px;border:none;border-radius:10px;font-size:1rem;font-weight:bold;cursor:pointer;transition:all .2s}
.btn-generate{background:var(--accent);color:#fff;width:100%}
.btn-generate:hover{background:var(--accent-h)}
.btn-generate:disabled{background:var(--disabled);cursor:not-allowed}
.btn-download{background:var(--btn2);color:var(--fg);margin-top:8px}
.btn-download:hover{background:var(--btn2-h)}
.status{text-align:center;padding:6px;color:var(--fg2);font-size:.8rem}
.status.error{color:var(--accent)}
.loading{display:none;text-align:center;padding:16px}
.loading.active{display:block}
.loading .spinner{display:inline-block;width:36px;height:36px;border:4px solid var(--spinner-bg);border-top:4px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.init-status{text-align:center;padding:8px;background:var(--bg2);border-radius:8px;font-size:.75rem;color:var(--fg3)}
.init-status.ready{color:#4caf50}
.init-status.loading{color:#ff9800}
.result-area{text-align:center}
.result-area img{max-width:100%;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.hidden{display:none !important}
</style>
</head>
<body>
<h1><span>😎</span> Deal With It</h1>
<div class="container">
  <div id="initStatus" class="init-status loading">Loading face detection model…</div>

  <div class="drop-zone" id="dropZone">
    <div class="icon">📸</div>
    <p>Drop a photo here or click to upload</p>
    <input type="file" id="photoInput" accept="image/*">
  </div>

  <!-- Live preview -->
  <div class="preview-wrap" id="previewWrap">
    <div class="preview-placeholder" id="previewPlaceholder">Upload a photo to see preview</div>
    <canvas id="previewCanvas" class="hidden"></canvas>
  </div>

  <!-- Glasses options -->
  <div class="section-title">🕶️ Glasses</div>
  <div class="grid3" id="glassesOpts">
    <div class="og">
      <label>Size</label>
      <input type="range" id="faceScale" min="0.8" max="2.5" step="0.05" value="1.3">
      <div class="val" id="faceScaleVal">auto</div>
    </div>
    <div class="og">
      <label>↔ Horizontal Offset</label>
      <input type="range" id="offX" min="-100" max="100" step="1" value="0">
      <div class="val" id="offXVal">0px</div>
    </div>
    <div class="og">
      <label>↕ Vertical Offset</label>
      <input type="range" id="offY" min="-100" max="100" step="1" value="0">
      <div class="val" id="offYVal">0px</div>
    </div>
    <div class="og">
      <label>Speed (ms/frame)</label>
      <input type="range" id="speed" min="20" max="100" step="5" value="50">
      <div class="val" id="speedVal">50ms</div>
    </div>
    <div class="og">
      <label>Rotation Fine-tune</label>
      <input type="range" id="rotAdj" min="-15" max="15" step="0.5" value="0">
      <div class="val" id="rotAdjVal">0°</div>
    </div>
    <div class="cg">
      <label for="glassesInput">Upload custom glasses PNG</label>
      <input type="file" id="glassesInput" accept="image/png">
      <span id="customGlassesName" style="font-size:.75rem;color:#888"></span>
    </div>
  </div>

  <!-- Text options -->
  <div class="section-title">
    ✍️ Text
    <label style="margin-left:auto;display:flex;align-items:center;gap:6px;cursor:pointer">
      <input type="checkbox" id="textEnabled" checked style="accent-color:#e94560"> Enabled
    </label>
  </div>
  <div id="textOpts">
    <div class="grid">
      <div class="og full">
        <label>Text</label>
        <input type="text" id="textContent" value="DEAL WITH IT" placeholder="Your text here">
      </div>
      <div class="og">
        <label>Font</label>
        <select id="textFont">
          <option value="Impact">Impact (Classic)</option>
          <option value="'Press Start 2P'">Pixel / Retro</option>
          <option value="Bangers">Bangers (Comic)</option>
          <option value="'Permanent Marker'">Marker</option>
          <option value="'Comic Sans MS'">Comic Sans</option>
          <option value="Arial Black">Arial Black</option>
        </select>
      </div>
      <div class="og">
        <label>Animation</label>
        <select id="textAnim">
          <option value="slide-left">Slide Left → Right</option>
          <option value="slide-right">Slide Right → Left</option>
          <option value="slide-up">Slide Up from Bottom</option>
          <option value="static">Static (appear)</option>
        </select>
      </div>
      <div class="og">
        <label>Colors</label>
        <div class="cr">
          <span>Fill</span><input type="color" id="textColor" value="#ffffff">
          <span>Outline</span><input type="color" id="textOutline" value="#000000">
        </div>
      </div>
      <div class="og">
        <label>Slide Out at End</label>
        <select id="textSlideOut">
          <option value="yes">Yes</option>
          <option value="no">No — stays on screen</option>
        </select>
      </div>
      <div class="og">
        <label>Text Size</label>
        <input type="range" id="textSize" min="0.03" max="0.15" step="0.005" value="0.08">
        <div class="val" id="textSizeVal">8%</div>
      </div>
      <div class="og">
        <label>Vertical Position</label>
        <input type="range" id="textY" min="0.05" max="0.95" step="0.01" value="0.88">
        <div class="val" id="textYVal">88%</div>
      </div>
      <div class="og">
        <label>Horizontal Position</label>
        <input type="range" id="textX" min="0.1" max="0.9" step="0.01" value="0.5">
        <div class="val" id="textXVal">center</div>
      </div>
    </div>
  </div>

  <button class="btn btn-generate" id="generateBtn" disabled>Generate GIF 😎</button>
  <div class="loading" id="loading"><div class="spinner"></div><p style="margin-top:8px;font-size:.85rem">Generating…</p></div>
  <div id="status" class="status"></div>
  <div class="result-area" id="resultArea"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<script type="module">
// ─── MediaPipe ─────────────────────────────────────────────────
const { FaceLandmarker, FilesetResolver } = await import(
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14"
);
let faceLandmarker = null;
try {
  const fr = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  faceLandmarker = await FaceLandmarker.createFromOptions(fr, {
    baseOptions: { modelAssetPath:"https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate:"CPU" },
    runningMode:"IMAGE", numFaces:1,
  });
  $("initStatus").textContent="✅ Face detection ready";
  $("initStatus").className="init-status ready";
  $("generateBtn").disabled=false;

  $("initStatus").textContent="❌ "+e.message;

let photoFile=null, photoImg=null, face=null, customGlassesSrc=null;

// ─── Face detection ────────────────────────────────────────────
function detectFace(img){
  if(!faceLandmarker)return null;
  const r=faceLandmarker.detect(img);
  if(!r.faceLandmarks?.length)return null;
  const lm=r.faceLandmarks[0];
  const w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
  const px=i=>[lm[i].x*w,lm[i].y*h];
  let le,re;
  try{le=px(L.LE);re=px(L.RE);}catch{
    const li=px(L.LEI),lo=px(L.LEO),ri=px(L.REI),ro=px(L.REO);
    le=[(li[0]+lo[0])/2,(li[1]+lo[1])/2];re=[(ri[0]+ro[0])/2,(ri[1]+ro[1])/2];
  }
  const midX=(le[0]+re[0])/2,midY=(le[1]+re[1])/2;
  const eyeSpan=Math.hypot(re[0]-le[0],re[1]-le[1]);
  const angle=Math.atan2(re[1]-le[1],re[0]-le[0])*180/Math.PI;
  const lt=px(L.LT),rt=px(L.RT);
  const faceWidth=Math.hypot(rt[0]-lt[0],rt[1]-lt[1]);
  const lc=px(L.LC),rc=px(L.RC),lj=px(L.LJ),rj=px(L.RJ);
  const dL=Math.abs(le[0]-(lc[0]+lj[0])/2),dR=Math.abs(re[0]-(rc[0]+rj[0])/2);
  const yawE=dL+dR>0?((dR-dL)/(dR+dL))*45:0;
  const yawN=((px(L.N)[0]-midX)/Math.max(faceWidth,1))*90;
  return{midX,midY,eyeSpan,faceWidth,angle:angle,yaw:yawE*0.7+yawN*0.3};
}

// ─── Glasses processing ────────────────────────────────────────
function processGlasses(canvas){
  const ctx=canvas.getContext("2d");
  const id=ctx.getImageData(0,0,canvas.width,canvas.height);
  const d=id.data,w=canvas.width,h=canvas.height,thr=220;
  const vis=new Uint8Array(w*h),q=[];
  const ix=(x,y)=>y*w+x;
  const isW=i=>d[i*4]>thr&&d[i*4+1]>thr&&d[i*4+2]>thr&&d[i*4+3]>128;
  for(let x=0;x<w;x++){if(isW(ix(x,0)))q.push([x,0]);if(isW(ix(x,h-1)))q.push([x,h-1]);}
  for(let y=0;y<h;y++){if(isW(ix(0,y)))q.push([0,y]);if(isW(ix(w-1,y)))q.push([w-1,y]);}
  while(q.length){const[x,y]=q.shift();const i=ix(x,y);if(vis[i]||!isW(i))continue;vis[i]=1;d[i*4+3]=0;
    if(x>0)q.push([x-1,y]);if(x<w-1)q.push([x+1,y]);if(y>0)q.push([x,y-1]);if(y<h-1)q.push([x,y+1]);}
  for(let i=0;i<w*h;i++){const a=d[i*4+3];if(a>0&&a<128){d[i*4+3]=0;continue;}
    if(a>128&&d[i*4]>200&&d[i*4+1]>200&&d[i*4+2]>200){d[i*4]=180;d[i*4+1]=180;d[i*4+2]=180;}}
  ctx.putImageData(id,0,0);
}

function loadGlassesSrc(src){
  return new Promise(res=>{const img=new Image();img.crossOrigin="anonymous";
    img.onload=()=>{const c=document.createElement("canvas");c.width=img.width;c.height=img.height;
      c.getContext("2d").drawImage(img,0,0);processGlasses(c);res(c);};img.src=src;});
}

let rawGlasses=null; // full-res processed glasses (no scale/rotation)
async function ensureRawGlasses(){
  if(!rawGlasses) rawGlasses=await loadGlassesSrc(customGlassesSrc||DEFAULT_GLASSES_B64);
}

function getScaledGlasses(targetW, angleDeg, flipH){
  if(!rawGlasses)return null;
  const aspect=rawGlasses.height/rawGlasses.width;
  const tw=targetW, th=Math.round(tw*aspect);
  // Scale
  let c=document.createElement("canvas");c.width=tw;c.height=th;
  let ctx=c.getContext("2d");
  if(flipH){ctx.save();ctx.scale(-1,1);ctx.drawImage(rawGlasses,-tw,0,tw,th);ctx.restore();}
  else ctx.drawImage(rawGlasses,0,0,tw,th);
  // Rotate
  if(Math.abs(angleDeg)>0.3){
    const rad=-angleDeg*Math.PI/180;
    const cos=Math.abs(Math.cos(rad)),sin=Math.abs(Math.sin(rad));
    const nw=Math.ceil(tw*cos+th*sin),nh=Math.ceil(tw*sin+th*cos);
    const rc=document.createElement("canvas");rc.width=nw;rc.height=nh;
    const rctx=rc.getContext("2d");rctx.translate(nw/2,nh/2);rctx.rotate(rad);
    rctx.drawImage(c,-tw/2,-th/2);c=rc;
  }
  return c;
}

// ─── Compute current placement ─────────────────────────────────
function getPlacement(){
  if(!photoImg)return null;
  const pw=photoImg.naturalWidth,ph=photoImg.naturalHeight;
  const fs=parseFloat($("faceScale").value);
  const ox=parseInt($("offX").value),oy=parseInt($("offY").value);
  const rotAdj=parseFloat($("rotAdj").value);
  let eyesX,eyesY,angle=0,yaw=0,gw;
  if(face){
    eyesX=face.midX;eyesY=face.midY;angle=face.angle;yaw=face.yaw;
    gw=Math.round(Math.max(face.faceWidth*fs,face.eyeSpan*2.8,face.faceWidth*1.45));
  }else{eyesX=pw/2;eyesY=ph*0.38;gw=Math.round(pw*0.4*fs);}
  const flipH=yaw<-5;
  const glasses=getScaledGlasses(gw,angle+rotAdj,flipH);
  if(!glasses)return null;
  const lx=Math.round(eyesX-glasses.width/2)+ox;
  const ly=Math.round(eyesY-glasses.height/2)+oy;
  return{glasses,lx,ly,pw,ph,gw,angle:angle+rotAdj,yaw,flipH};
}

// ─── Draw text helper ──────────────────────────────────────────
function drawText(ctx,pw,ph,text,opts,progress){
  if(!text)return;
  const fontSize=Math.round(ph*opts.size);
  ctx.font=`bold ${fontSize}px ${opts.font}`;
  ctx.textAlign="center";ctx.textBaseline="middle";
  const olW=Math.max(2,fontSize*0.08);
  const targetX=pw*opts.x, targetY=ph*opts.y;
  let x=targetX,y=targetY;
  const isOut=progress>1;const t=isOut?(progress-1):progress;
  const ease=t2=>t2<0.5?2*t2*t2:-1+(4-2*t2)*t2;
  if(opts.anim==="slide-left"){const f=isOut?0:-pw*0.6,to=isOut?pw*1.6:0;x=targetX+f+(to-f)*ease(t);}
  else if(opts.anim==="slide-right"){const f=isOut?0:pw*0.6,to=isOut?-pw*1.6:0;x=targetX+f+(to-f)*ease(t);}
  else if(opts.anim==="slide-up"){const f=isOut?0:ph*0.5,to=isOut?-ph*0.5:0;y=targetY+f+(to-f)*ease(t);}
  ctx.strokeStyle=opts.outline;ctx.lineWidth=olW;ctx.lineJoin="round";
  ctx.strokeText(text,x,y);ctx.fillStyle=opts.color;ctx.fillText(text,x,y);
}

// ─── Live preview ──────────────────────────────────────────────
function renderPreview(){
  const p=getPlacement();
  if(!p)return;
  const c=$("previewCanvas");c.width=p.pw;c.height=p.ph;
  c.classList.remove("hidden");$("previewPlaceholder").classList.add("hidden");
  const ctx=c.getContext("2d");
  ctx.drawImage(photoImg,0,0,p.pw,p.ph);
  ctx.drawImage(p.glasses,p.lx,p.ly);
  // Text preview
  if($("textEnabled").checked && $("textContent").value){
    drawText(ctx,p.pw,p.ph,$("textContent").value,{
      font:$("textFont").value, color:$("textColor").value, outline:$("textOutline").value,
      anim:"static", size:parseFloat($("textSize").value),
      x:parseFloat($("textX").value), y:parseFloat($("textY").value),
    },1);
  }
}

// ─── GIF generation ────────────────────────────────────────────
async function generateGIF(){
  const p=getPlacement();if(!p)throw new Error("No placement");
  const{glasses,lx,ly,pw,ph}=p;
  const spd=parseInt($("speed").value);
  const startY=-glasses.height;
  const dropF=20,holdF=12;
  const hasText=$("textEnabled").checked&&$("textContent").value;
  const textInF=10,textHoldF=8,textOutF=8;
  const slideOut=$("textSlideOut").value==="yes";
  const total=dropF+holdF+(hasText?textInF+textHoldF+(slideOut?textOutF:0):0);
  const tOpts={font:$("textFont").value,color:$("textColor").value,outline:$("textOutline").value,
    anim:$("textAnim").value,size:parseFloat($("textSize").value),
    x:parseFloat($("textX").value),y:parseFloat($("textY").value)};
  const txt=$("textContent").value;

  const gif=new GIF({workers:2,quality:10,width:pw,height:ph,
    workerScript:"https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js"});
  const fc=document.createElement("canvas");fc.width=pw;fc.height=ph;
  const fctx=fc.getContext("2d");

  for(let i=0;i<total;i++){
    fctx.clearRect(0,0,pw,ph);fctx.drawImage(photoImg,0,0,pw,ph);
    let gy;
    if(i<dropF){
      const dp=dropF*0.85,bp=dropF-dp;
      if(i<dp){const t=i/dp;gy=startY+(ly-startY)*t*t;}
      else{const bt=(i-dp)/bp;gy=ly-Math.sin(bt*Math.PI)*glasses.height*0.08;}
    }else{gy=ly;}
    fctx.drawImage(glasses,lx,Math.round(gy));
    if(hasText&&i>=dropF+holdF){
      const tf=i-(dropF+holdF);let prog;
      if(tf<textInF)prog=tf/textInF;
      else if(tf<textInF+textHoldF)prog=1;
      else if(slideOut)prog=1+(tf-textInF-textHoldF)/textOutF;
      else prog=1;
      if(tOpts.anim==="static")prog=1;
      drawText(fctx,pw,ph,txt,tOpts,prog);
    }
    gif.addFrame(fctx,{copy:true,delay:spd});
  }
  return new Promise(res=>{gif.on("finished",b=>res(b));gif.render();});
}

// ─── UI wiring ─────────────────────────────────────────────────
// Photo upload
const dz=$("dropZone"),pi=$("photoInput");
dz.addEventListener("click",()=>pi.click());
dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("dragover");});
dz.addEventListener("dragleave",()=>dz.classList.remove("dragover"));
dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("dragover");if(e.dataTransfer.files.length)handlePhoto(e.dataTransfer.files[0]);});
pi.addEventListener("change",()=>{if(pi.files.length)handlePhoto(pi.files[0]);});

async function handlePhoto(f){
  photoFile=f;
  dz.innerHTML=`<div class="icon">✅</div><p>${f.name} (${(f.size/1024).toFixed(0)}KB)</p>`;
  $("status").textContent="Detecting face…";$("status").className="status";
  $("resultArea").innerHTML="";
  photoImg=await new Promise((res,rej)=>{const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=URL.createObjectURL(f);});
  await ensureRawGlasses();
  face=detectFace(photoImg);
  if(face){
    $("status").textContent=`Face: ${Math.round(face.faceWidth)}px wide, tilt ${face.angle.toFixed(1)}°, yaw ${face.yaw.toFixed(1)}°`;
    $("faceScaleVal").textContent="auto ("+Math.round(parseFloat($("faceScale").value)*100)+"%)";
  }else{$("status").textContent="No face detected — using center fallback";}
  renderPreview();
}

// Custom glasses
$("glassesInput").addEventListener("change",async function(){
  if(this.files.length){
    $("customGlassesName").textContent=this.files[0].name;
    const r=new FileReader();r.onload=async e=>{customGlassesSrc=e.target.result;rawGlasses=null;await ensureRawGlasses();renderPreview();};
    r.readAsDataURL(this.files[0]);
  }
});

// All sliders/inputs trigger live preview
const previewInputs=["faceScale","offX","offY","speed","rotAdj","textEnabled","textContent",
  "textFont","textAnim","textColor","textOutline","textSlideOut","textSize","textY","textX"];
previewInputs.forEach(id=>{
  const el=$(id);if(!el)return;
  el.addEventListener("input",()=>{updateLabels();renderPreview();});
  el.addEventListener("change",()=>{updateLabels();renderPreview();});
});

function updateLabels(){
  $("faceScaleVal").textContent=Math.round(parseFloat($("faceScale").value)*100)+"%";
  $("offXVal").textContent=$("offX").value+"px";
  $("offYVal").textContent=$("offY").value+"px";
  $("speedVal").textContent=$("speed").value+"ms";
  $("rotAdjVal").textContent=$("rotAdj").value+"°";
  $("textSizeVal").textContent=Math.round(parseFloat($("textSize").value)*100)+"%";
  $("textYVal").textContent=Math.round(parseFloat($("textY").value)*100)+"%";
  const xv=parseFloat($("textX").value);
  $("textXVal").textContent=xv===0.5?"center":Math.round(xv*100)+"%";
}

// Toggle text section
$("textEnabled").addEventListener("change",()=>{
  $("textOpts").style.display=$("textEnabled").checked?"block":"none";
  renderPreview();
});

// Generate button
$("generateBtn").addEventListener("click",async()=>{
  if(!photoImg){$("status").textContent="Upload a photo first!";$("status").className="status error";return;}
  $("generateBtn").disabled=true;$("loading").classList.add("active");
  $("status").textContent="Generating…";$("resultArea").innerHTML="";
  try{
    const blob=await generateGIF();
    const url=URL.createObjectURL(blob);
    $("resultArea").innerHTML=`<img src="${url}"><br><a href="${url}" download="deal_with_it.gif" class="btn btn-download">⬇️ Download GIF (${(blob.size/1024).toFixed(0)}KB)</a>`;
    $("status").textContent="✅ Done!";$("status").className="status";
  }catch(e){$("status").textContent="Error: "+e.message;$("status").className="status error";console.error(e);}
  finally{$("generateBtn").disabled=false;$("loading").classList.remove("active");}
});
</script>
