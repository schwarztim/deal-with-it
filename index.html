<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal With It 😎</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:2.5rem;margin:20px 0;text-align:center}
h1 span{font-size:3rem}
.container{max-width:700px;width:100%;display:flex;flex-direction:column;gap:20px}
.drop-zone{border:3px dashed #444;border-radius:16px;padding:60px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#16213e}
.drop-zone:hover,.drop-zone.dragover{border-color:#e94560;background:#1a1a3e}
.drop-zone p{font-size:1.1rem;color:#888}
.drop-zone .icon{font-size:3rem;margin-bottom:10px}
.drop-zone input{display:none}
.options{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.option-group{background:#16213e;border-radius:12px;padding:16px}
.option-group label{display:block;font-size:.85rem;color:#aaa;margin-bottom:8px}
.option-group input[type="range"]{width:100%;accent-color:#e94560}
.option-group .value{text-align:center;font-weight:bold;color:#e94560;margin-top:4px}
.custom-glasses{grid-column:1/-1;text-align:center}
.custom-glasses label{cursor:pointer;color:#e94560;text-decoration:underline}
.custom-glasses input{display:none}
.preview-area{text-align:center;min-height:100px}
.preview-area img{max-width:100%;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.btn{display:inline-block;padding:14px 36px;border:none;border-radius:12px;font-size:1.1rem;font-weight:bold;cursor:pointer;transition:all .2s}
.btn-generate{background:#e94560;color:#fff;width:100%}
.btn-generate:hover{background:#c73e55}
.btn-generate:disabled{background:#555;cursor:not-allowed}
.btn-download{background:#0f3460;color:#fff;margin-top:10px}
.btn-download:hover{background:#1a4a80}
.status{text-align:center;padding:10px;color:#aaa;font-size:.9rem}
.status.error{color:#e94560}
.loading{display:none;text-align:center;padding:20px}
.loading.active{display:block}
.loading .spinner{display:inline-block;width:40px;height:40px;border:4px solid #333;border-top:4px solid #e94560;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.init-status{text-align:center;padding:12px;background:#16213e;border-radius:8px;font-size:.85rem;color:#888}
.init-status.ready{color:#4caf50}
.init-status.loading{color:#ff9800}
.init-status.error{color:#e94560}
</style>
</head>
<body>
<h1><span>😎</span> Deal With It</h1>
<div class="container">
  <div id="initStatus" class="init-status loading">Loading face detection model…</div>

  <div class="drop-zone" id="dropZone">
    <div class="icon">📸</div>
    <p>Drop a photo here or click to upload</p>
    <input type="file" id="photoInput" accept="image/*">
  </div>

  <div class="options">
    <div class="option-group">
      <label>Glasses Size</label>
      <input type="range" id="faceScale" min="0.8" max="2.0" step="0.05" value="1.3">
      <div class="value" id="faceScaleVal">130%</div>
    </div>
    <div class="option-group">
      <label>Speed (ms/frame)</label>
      <input type="range" id="speed" min="20" max="100" step="5" value="50">
      <div class="value" id="speedVal">50ms</div>
    </div>
    <div class="custom-glasses">
      <label for="glassesInput">Upload custom glasses PNG (optional)</label>
      <input type="file" id="glassesInput" accept="image/png">
    </div>
  </div>

  <button class="btn btn-generate" id="generateBtn" disabled>Generate 😎</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="margin-top:10px">Generating your meme…</p>
  </div>

  <div id="status" class="status"></div>

  <div class="preview-area" id="previewArea"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<script type="module">
// ─── MediaPipe setup ───────────────────────────────────────────

  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14"
);

let faceLandmarker = null;
const initStatus = document.getElementById("initStatus");

try {
  const filesetResolver = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
      delegate: "CPU",
    },
    runningMode: "IMAGE",
    numFaces: 1,
  });
  initStatus.textContent = "✅ Face detection ready";
  initStatus.className = "init-status ready";
  document.getElementById("generateBtn").disabled = false;
} catch (e) {
  initStatus.textContent = "❌ Failed to load face model: " + e.message;
  initStatus.className = "init-status error";
  console.error(e);
}

  const result = faceLandmarker.detect(imageElement);
  if (!result.faceLandmarks || result.faceLandmarks.length === 0) return null;

  const lm = result.faceLandmarks[0];
  const w = imageElement.naturalWidth || imageElement.width;
  const h = imageElement.naturalHeight || imageElement.height;

  const px = (idx) => [lm[idx].x * w, lm[idx].y * h];

  let leftEye, rightEye;
  try {
    leftEye = px(LEFT_EYE_CENTER);
    rightEye = px(RIGHT_EYE_CENTER);
  } catch {
    const li = px(LEFT_EYE_INNER), lo = px(LEFT_EYE_OUTER);
    const ri = px(RIGHT_EYE_INNER), ro = px(RIGHT_EYE_OUTER);
    leftEye = [(li[0]+lo[0])/2, (li[1]+lo[1])/2];
    rightEye = [(ri[0]+ro[0])/2, (ri[1]+ro[1])/2];
  }

  const midX = (leftEye[0] + rightEye[0]) / 2;
  const midY = (leftEye[1] + rightEye[1]) / 2;
  const eyeSpan = Math.hypot(rightEye[0]-leftEye[0], rightEye[1]-leftEye[1]);
  const angle = Math.atan2(rightEye[1]-leftEye[1], rightEye[0]-leftEye[0]) * 180 / Math.PI;

  const lt = px(LEFT_TEMPLE), rt = px(RIGHT_TEMPLE);
  const faceWidth = Math.hypot(rt[0]-lt[0], rt[1]-lt[1]);

  // Yaw from ear asymmetry
  const lc = px(LEFT_CHEEK_OUTER), rc = px(RIGHT_CHEEK_OUTER);
  const lj = px(LEFT_JAW), rj = px(RIGHT_JAW);
  const leftEarX = (lc[0]+lj[0])/2, rightEarX = (rc[0]+rj[0])/2;
  const distLeft = Math.abs(leftEye[0]-leftEarX);
  const distRight = Math.abs(rightEye[0]-rightEarX);
  let yawFromEars = 0;
  if (distLeft+distRight > 0) {
    yawFromEars = ((distRight-distLeft)/(distRight+distLeft)) * 45;
  }
  const nose = px(NOSE_TIP);
  const yawFromNose = ((nose[0]-midX)/Math.max(faceWidth,1)) * 90;
  const yaw = yawFromEars * 0.7 + yawFromNose * 0.3;

  return { midX, midY, eyeSpan, faceWidth, angle, yaw };
}

// ─── Glasses background removal (flood-fill from edges) ────────
function removeBackground(canvas) {
  const ctx = canvas.getContext("2d");
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const { data, width, height } = imgData;
  const threshold = 220; // white-ish
  const visited = new Uint8Array(width * height);
  const queue = [];

  const idx = (x, y) => y * width + x;
  const isWhiteish = (i) => {
    const p = i * 4;
    return data[p] > threshold && data[p+1] > threshold && data[p+2] > threshold && data[p+3] > 128;
  };

  // Seed from all border pixels
  for (let x = 0; x < width; x++) {
    if (isWhiteish(idx(x, 0))) queue.push([x, 0]);
    if (isWhiteish(idx(x, height-1))) queue.push([x, height-1]);
  }
  for (let y = 0; y < height; y++) {
    if (isWhiteish(idx(0, y))) queue.push([0, y]);
    if (isWhiteish(idx(width-1, y))) queue.push([width-1, y]);
  }

  // BFS flood fill
  while (queue.length > 0) {
    const [x, y] = queue.shift();
    const i = idx(x, y);
    if (visited[i]) continue;
    if (!isWhiteish(i)) continue;
    visited[i] = 1;
    data[i*4+3] = 0; // make transparent
    if (x > 0) queue.push([x-1, y]);
    if (x < width-1) queue.push([x+1, y]);
    if (y > 0) queue.push([x, y-1]);
    if (y < height-1) queue.push([x, y+1]);
  }

  // Alpha fringe cleanup
  for (let i = 0; i < width*height; i++) {
    const a = data[i*4+3];
    if (a > 0 && a < 128) data[i*4+3] = 0;
  }

  ctx.putImageData(imgData, 0, 0);
}

// ─── Load glasses image ────────────────────────────────────────
function loadGlasses(src, targetWidth) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      const aspect = img.height / img.width;
      const tw = targetWidth;
      const th = Math.round(tw * aspect);

      // Draw onto canvas for pixel manipulation
      const c = document.createElement("canvas");
      c.width = img.width; c.height = img.height;
      const ctx = c.getContext("2d");
      ctx.drawImage(img, 0, 0);

      // Remove white background (flood fill from edges)
      removeBackground(c);

      // Scale to target size
      const sc = document.createElement("canvas");
      sc.width = tw; sc.height = th;
      const sctx = sc.getContext("2d");
      sctx.drawImage(c, 0, 0, tw, th);

      resolve(sc);
    };
    img.src = src;
  });
}

// ─── GIF Generation ────────────────────────────────────────────
async function generateGIF(photoImg, face, faceScale, speedMs, glassesSrc) {
  const pw = photoImg.naturalWidth || photoImg.width;
  const ph = photoImg.naturalHeight || photoImg.height;

  let eyesXY, angle = 0, yaw = 0, glassesWidth;

  if (face) {
    eyesXY = [face.midX, face.midY];
    angle = face.angle;
    yaw = face.yaw;

    const fromFace = face.faceWidth * faceScale;
    const fromIPD = face.eyeSpan * 2.8;
    const memeFloor = face.faceWidth * 1.45;
    glassesWidth = Math.round(Math.max(fromFace, fromIPD, memeFloor));
  } else {
    eyesXY = [pw/2, ph*0.38];
    glassesWidth = Math.round(pw * 0.4);
  }

  // Load and process glasses
  const glassesCanvas = await loadGlasses(glassesSrc, glassesWidth);

  // Mirror if yaw < -5
  if (yaw < -5) {
    const ctx = glassesCanvas.getContext("2d");
    const imgData = ctx.getImageData(0, 0, glassesCanvas.width, glassesCanvas.height);
    ctx.clearRect(0, 0, glassesCanvas.width, glassesCanvas.height);
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(glassesCanvas, -glassesCanvas.width, 0);
    ctx.restore();
    // Redraw from flipped
    const fc = document.createElement("canvas");
    fc.width = glassesCanvas.width; fc.height = glassesCanvas.height;
    const fctx = fc.getContext("2d");
    fctx.save(); fctx.scale(-1,1);
    fctx.drawImage(glassesCanvas, -fc.width, 0);
    fctx.restore();
    ctx.clearRect(0,0,glassesCanvas.width,glassesCanvas.height);
    ctx.drawImage(fc, 0, 0);
  }

  // Rotate glasses to match head tilt
  let finalGlasses = glassesCanvas;
  if (Math.abs(angle) > 0.5) {
    const rad = -angle * Math.PI / 180;
    const cos = Math.abs(Math.cos(rad)), sin = Math.abs(Math.sin(rad));
    const nw = Math.ceil(glassesCanvas.width*cos + glassesCanvas.height*sin);
    const nh = Math.ceil(glassesCanvas.width*sin + glassesCanvas.height*cos);
    const rc = document.createElement("canvas");
    rc.width = nw; rc.height = nh;
    const rctx = rc.getContext("2d");
    rctx.translate(nw/2, nh/2);
    rctx.rotate(rad);
    rctx.drawImage(glassesCanvas, -glassesCanvas.width/2, -glassesCanvas.height/2);
    finalGlasses = rc;
  }

  const gw = finalGlasses.width, gh = finalGlasses.height;
  const landX = Math.round(eyesXY[0] - gw/2);
  const landY = Math.round(eyesXY[1] - gh/2);
  const startY = -gh;

  const numFrames = 20;
  const pauseFrames = 12;

  // Create GIF
  const gif = new GIF({
    workers: 2,
    quality: 10,
    width: pw,
    height: ph,
    workerScript: "https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js",
  });

  const frameCanvas = document.createElement("canvas");
  frameCanvas.width = pw; frameCanvas.height = ph;
  const fctx = frameCanvas.getContext("2d");

  for (let i = 0; i < numFrames + pauseFrames; i++) {
    fctx.clearRect(0, 0, pw, ph);
    fctx.drawImage(photoImg, 0, 0, pw, ph);

    let y;
    if (i < numFrames) {
      const dropFrac = numFrames * 0.85;
      const bounceFrac = numFrames - dropFrac;
      if (i < dropFrac) {
        const t = i / dropFrac;
        const ease = t * t; // ease-in
        y = startY + (landY - startY) * ease;
      } else {
        const bt = (i - dropFrac) / bounceFrac;
        const bounce = Math.sin(bt * Math.PI) * gh * 0.08;
        y = landY - bounce;
      }
    } else {
      y = landY;
    }

    fctx.drawImage(finalGlasses, landX, Math.round(y));
    gif.addFrame(fctx, { copy: true, delay: speedMs });
  }

  return new Promise((resolve) => {
    gif.on("finished", (blob) => resolve(blob));
    gif.render();
  });
}

// ─── UI wiring ─────────────────────────────────────────────────
const dropZone = document.getElementById("dropZone");
const photoInput = document.getElementById("photoInput");
const glassesInput = document.getElementById("glassesInput");
const faceScaleSlider = document.getElementById("faceScale");
const faceScaleVal = document.getElementById("faceScaleVal");
const speedSlider = document.getElementById("speed");
const speedVal = document.getElementById("speedVal");
const generateBtn = document.getElementById("generateBtn");
const loading = document.getElementById("loading");
const status = document.getElementById("status");
const previewArea = document.getElementById("previewArea");

let photoFile = null;
let customGlassesSrc = null;

// Drop zone
dropZone.addEventListener("click", () => photoInput.click());
dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  if (e.dataTransfer.files.length) handlePhoto(e.dataTransfer.files[0]);
});
photoInput.addEventListener("change", () => { if (photoInput.files.length) handlePhoto(photoInput.files[0]); });

function handlePhoto(file) {
  photoFile = file;
  dropZone.innerHTML = `<div class="icon">✅</div><p>${file.name} (${(file.size/1024).toFixed(0)}KB)</p>`;
  status.textContent = "";
  previewArea.innerHTML = "";
}

// Custom glasses
glassesInput.addEventListener("change", () => {
  if (glassesInput.files.length) {
    const reader = new FileReader();
    reader.onload = (e) => { customGlassesSrc = e.target.result; };
    reader.readAsDataURL(glassesInput.files[0]);
  }
});

// Sliders
faceScaleSlider.addEventListener("input", () => {
  faceScaleVal.textContent = Math.round(faceScaleSlider.value * 100) + "%";
});
speedSlider.addEventListener("input", () => {
  speedVal.textContent = speedSlider.value + "ms";
});

// Generate
generateBtn.addEventListener("click", async () => {
  if (!photoFile) { status.textContent = "Please upload a photo first!"; status.className = "status error"; return; }

  generateBtn.disabled = true;
  loading.classList.add("active");
  status.textContent = "";
  previewArea.innerHTML = "";

  try {
    // Load photo as Image element
    const photoImg = await new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = URL.createObjectURL(photoFile);
    });

    status.textContent = "Detecting face…";
    status.className = "status";
    const face = detectFace(photoImg);

    if (face) {
      status.textContent = `Face found — width: ${Math.round(face.faceWidth)}px, tilt: ${face.angle.toFixed(1)}°, yaw: ${face.yaw.toFixed(1)}°`;
    } else {
      status.textContent = "No face detected — using center fallback";
    }

    const glassesSrc = customGlassesSrc || DEFAULT_GLASSES_B64;
    const faceScale = parseFloat(faceScaleSlider.value);
    const speed = parseInt(speedSlider.value);

    status.textContent += " • Generating GIF…";
    const blob = await generateGIF(photoImg, face, faceScale, speed, glassesSrc);

    const url = URL.createObjectURL(blob);
    previewArea.innerHTML = `
      <img src="${url}" alt="Deal with it GIF">
      <br>
      <a href="${url}" download="deal_with_it.gif" class="btn btn-download">⬇️ Download GIF</a>
    `;
    status.textContent = `✅ Done! ${(blob.size/1024).toFixed(0)}KB`;
    status.className = "status";
  } catch (e) {
    status.textContent = "Error: " + e.message;
    status.className = "status error";
    console.error(e);
  } finally {
    generateBtn.disabled = false;
    loading.classList.remove("active");
  }
});
</script>
</body>
